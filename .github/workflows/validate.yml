name: validate
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate data.js
        id: validate
        run: node scripts/validate-data.js

      - name: Ensure data.js untouched (dev PR)
        if: ${{ !startsWith(github.head_ref, 'content/') }}
        run: |
          echo "::group::dev 分支 data.js 触碰检查"
          git fetch origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^data\.js$'; then
            echo "::error::feature/* / fix/* PR 不得修改 data.js"
            echo "::error::数据值变更请走 content/* 分支（由运营 Agent 执行）"
            echo "::error::如需新增字段/修改结构，请修改 schema/ 和 constants.js"
            exit 1
          fi
          echo "检查通过：data.js 未被修改"
          echo "::endgroup::"

      - name: Check file scope (content/* PR only)
        if: startsWith(github.head_ref, 'content/')
        run: |
          echo "::group::content/* 分支文件范围检查"
          git fetch origin "${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          EXTRA=$(echo "$CHANGED" | grep -Ev '^data\.js$' || true)
          if [ -n "$EXTRA" ]; then
            echo "::error::content/* PR 只能包含 data.js 变更，发现额外文件："
            echo "$EXTRA" | while read f; do
              echo "::error::  - $f"
            done
            exit 1
          fi
          echo "文件范围检查通过：仅 data.js"
          echo "::endgroup::"
