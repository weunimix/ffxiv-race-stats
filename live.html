<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>实时战况 — [当届赛事名称]</title>
  <style>
    /* ===========================================================
       TOKEN SYSTEM — 与 index.html 共享，换变量即可整站换肤
       =========================================================== */
    :root {
      --bg:      oklch(98% 0.004 90);
      --surface: oklch(100% 0 0);
      --fg:      oklch(15% 0.02 100);
      --muted:   oklch(42% 0.02 100);
      --border:  oklch(15% 0.02 100);
      --accent:  oklch(58% 0.17 50);

      --crt-bg:    oklch(12% 0.018 160);
      --crt-fg:    oklch(78% 0.08 155);
      --crt-glow:  oklch(72% 0.13 155);
      --crt-muted: oklch(45% 0.04 155);
      --crt-border:oklch(32% 0.02 160);

      --live:   oklch(58% 0.20 28);
      --warn:   oklch(65% 0.18 80);
      --success:oklch(58% 0.16 155);

      --font-display: 'Times New Roman', 'Iowan Old Style', Georgia, serif;
      --font-body:    ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', Menlo, monospace;
      --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    }

    /* ---- RESET ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      font-size: 16px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body { max-width: 1280px; margin: 0 auto; padding: 0 24px 80px; min-height: 100vh; }

    /* ---- TOP STATUS BAR (CRT) ---- */
    .status-bar {
      background: var(--crt-bg);
      color: var(--crt-fg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      margin: 24px 0 0;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--crt-border);
      position: relative;
      overflow: hidden;
    }
    .status-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      animation: scan-roll 3.2s linear infinite;
    }
    @keyframes scan-roll {
      from { background-position: 0 0; }
      to   { background-position: 0 12px; }
    }
    .status-bar > * { position: relative; z-index: 1; }
    .status-event { color: var(--crt-glow); }
    .status-dc    { color: var(--crt-muted); }
    .status-timer { color: var(--crt-fg); }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--live);
      font-size: 11px;
      letter-spacing: 0.1em;
    }
    .live-indicator::before {
      content: "";
      width: 7px; height: 7px;
      background: var(--live);
      animation: led-blink 1.2s steps(2) infinite;
    }
    @keyframes led-blink { 50% { opacity: 0.15; } }

    /* ---- HEADER ---- */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 28px 0 20px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    .page-header .back-link {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-underline-offset: 4px;
    }
    .page-header .back-link:hover { color: var(--fg); }

    /* ---- LEGEND ---- */
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .legend-dot {
      display: inline-block;
      width: 8px; height: 8px;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* ---- TEAM TABLE ---- */
    .team-table { width: 100%; }

    .team-row {
      display: grid;
      grid-template-columns: 32px minmax(72px, 1fr) 48px 172px 280px 52px;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 2px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      font-size: 15px;
      position: relative;
    }
    .team-row:hover { background: oklch(96% 0.004 90); }
    .team-row.is-expanded { border-bottom: none; background: oklch(97% 0.006 90); }

    .t-rank {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: var(--muted);
    }
    .t-rank.top { color: var(--fg); }
    .t-rank.r1 { color: var(--accent); }

    .t-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .t-phase {
      font-family: var(--font-mono);
      font-size: 13px;
      text-align: center;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    /* ---- HP BAR ---- */
    .t-hp {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hp-track {
      flex: 1;
      height: 10px;
      background: oklch(92% 0.005 90);
      position: relative;
    }
    .hp-fill {
      height: 100%;
      width: 0;
      background: var(--crt-glow);
      transition: width 700ms steps(20, end);
    }
    .hp-fill.is-set { width: var(--fill-target); }
    .hp-fill.danger  { background: var(--live); }
    .hp-fill.warning { background: var(--warn); }
    .hp-fill.stable { background: var(--crt-glow); }
    .hp-num {
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.04em;
      width: 36px;
      text-align: right;
      color: var(--crt-glow);
    }
    .hp-num.danger  { color: var(--live); }
    .hp-num.warning { color: var(--warn); }
    .hp-num.stable  { color: var(--crt-glow); }

    /* ---- JOB BADGES ---- */
    .t-comp {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .t-comp .role-gap { width: 4px; }

    .job-badge {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--bg);
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.25s, transform 0.25s;
    }
    .job-badge.is-in {
      opacity: 1;
      transform: scale(1);
    }
    .job-badge.tank   { background: oklch(48% 0.12 255); }
    .job-badge.healer { background: oklch(48% 0.12 170); }
    .job-badge.dps    { background: oklch(48% 0.14 25); }

    .job-badge:hover {
      transform: scale(1.15);
      filter: brightness(1.25);
      cursor: pointer;
    }

    /* ---- LIVE LINK ---- */
    .t-live {
      text-align: center;
    }
    .t-live a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--border);
      white-space: nowrap;
      transition: color 0.12s, border-color 0.12s;
    }
    .t-live a:hover { color: var(--accent); border-color: var(--accent); }

    /* ---- EXPANDED PLAYER DETAIL ---- */
    .player-detail {
      display: none;
      background: var(--crt-bg);
      color: var(--crt-fg);
      padding: 0 16px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      position: relative;
      overflow: hidden;
    }
    .player-detail::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
    }
    .team-row.is-expanded + .player-detail { display: block; }

    .player-detail-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px 16px;
      padding-top: 8px;
      border-top: 1px solid var(--crt-border);
    }

    .player-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }
    .pe-job {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--bg);
      flex-shrink: 0;
    }
    .pe-job.tank   { background: oklch(48% 0.12 255); }
    .pe-job.healer { background: oklch(48% 0.12 170); }
    .pe-job.dps    { background: oklch(48% 0.14 25); }
    .pe-stream {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--crt-muted);
      text-decoration: none;
      transition: color 0.12s;
    }
    .pe-stream:hover { color: var(--crt-glow); }
    .pe-stream::before { content: "▶ "; font-size: 9px; }

    /* ---- NEWS TICKER ---- */
    .news-ticker {
      margin-top: 40px;
      border-top: 2px solid var(--border);
      padding-top: 20px;
    }
    .news-ticker h2 {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      color: var(--muted);
    }
    .ticker-item {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 2px solid var(--border);
      font-size: 13px;
      align-items: baseline;
      animation: news-in 0.4s linear;
    }
    @keyframes news-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .ticker-time {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .ticker-text.urgent { color: var(--warn); }

    /* ---- FOOTER ---- */
    .site-footer {
      margin-top: 48px;
      border-top: 2px solid var(--border);
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .site-footer a { color: var(--muted); }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 1020px) {
      .team-row {
        grid-template-columns: 28px minmax(60px, 1fr) 40px 140px 240px 44px;
        gap: 8px;
        font-size: 13px;
      }
      .t-comp { gap: 2px; }
    }
    @media (max-width: 800px) {
      .player-detail-inner { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .team-row {
        grid-template-columns: 24px 1fr 36px;
        gap: 6px;
        padding: 10px 12px;
        font-size: 12px;
      }
      .t-hp, .t-comp, .t-live { display: none; }
      .status-bar { flex-wrap: wrap; gap: 4px; font-size: 10px; }
      .page-header h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <!-- STATUS BAR (CRT) -->
  <div class="status-bar">
    <span class="status-event">[当届赛事名称] · 第 2 日</span>
    <span class="status-dc">[数据中心] · [副本名称]</span>
    <span class="status-timer">开赛 +47:32:15</span>
    <span class="live-indicator">LIVE</span>
  </div>

  <!-- HEADER -->
  <div class="page-header">
    <h1>实时战况追踪</h1>
    <a class="back-link" href="index.html">← 返回首页</a>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <span><span class="legend-dot" style="background:oklch(48% 0.12 255)"></span> 防护职业</span>
    <span><span class="legend-dot" style="background:oklch(48% 0.12 170)"></span> 治疗职业</span>
    <span><span class="legend-dot" style="background:oklch(48% 0.14 25)"></span> 进攻职业</span>
    <span style="margin-left:12px">Boss HP ↓ = 排名 ↑</span>
  </div>

  <!-- TEAM TABLE -->
  <div class="team-table" id="teamTable">
    <!-- JS 动态渲染 -->
  </div>

  <!-- NEWS TICKER -->
  <div class="news-ticker" id="newsTicker">
    <h2>速报时间线</h2>
    <!-- JS 动态渲染 -->
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span>FFXIV 高难首杀竞速年鉴 · [当届赛事名称]</span>
    <span><a href="index.html">首页</a> · <a href="index.html#archive">往期年鉴</a></span>
  </footer>

  <script src="data.js"></script>
  <script>
    (function () {
      var teams = RACE_DATA.teams;
      var news  = RACE_DATA.news;
      var meta  = RACE_DATA.meta;

      // ---- RENDER TEAM ROWS ----
      var tableEl = document.getElementById('teamTable');

      function hpClass(hp) {
        if (hp <= 25) return 'danger';
        if (hp <= 50) return 'warning';
        return 'stable';
      }

      function renderTeamRow(t, idx) {
        var rankClass = '';
        if (idx === 0) rankClass = ' top r1';
        else if (idx < 3) rankClass = ' top';

        var html = '';
        html += '<div class="team-row" data-team="' + t.id + '" tabindex="0" role="button" aria-expanded="false">';
        html += '  <span class="t-rank' + rankClass + '">#' + t.rank + '</span>';
        html += '  <span class="t-name">' + t.name + '</span>';
        html += '  <span class="t-phase">' + t.phase + '</span>';
        html += '  <div class="t-hp">';
        html += '    <span class="hp-track"><span class="hp-fill ' + hpClass(t.bossHP) + '" data-hp="' + t.bossHP + '"></span></span>';
        html += '    <span class="hp-num ' + hpClass(t.bossHP) + '">' + t.bossHP + '%</span>';
        html += '  </div>';
        html += '  <div class="t-comp">';
        // 2T | 2H | 4DPS clusters
        var players = t.players;
        // Render in role clusters: tank(0-1), healer(2-3), dps(4-7)
        for (var pi = 0; pi < players.length; pi++) {
          if (pi === 2 || pi === 4) {
            html += '<span class="role-gap"></span>';
          }
          html += '<span class="job-badge ' + players[pi].role + '" data-job="' + players[pi].job + '" style="transition-delay:' + (pi * 60) + 'ms" title="' + players[pi].job + '">' + players[pi].job + '</span>';
        }
        html += '  </div>';
        html += '  <span class="t-live">';
        html += '    <a href="#" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="站外直播入口">直播 →</a>';
        html += '  </span>';
        html += '</div>';

        // Player detail (hidden)
        html += '<div class="player-detail">';
        html += '  <div class="player-detail-inner">';
        for (var pj = 0; pj < players.length; pj++) {
          var p = players[pj];
          html += '    <div class="player-entry">';
          html += '      <span class="pe-job ' + p.role + '">' + p.job + '</span>';
          html += '      <a class="pe-stream" href="' + p.stream + '" target="_blank" rel="noopener">' + p.job + ' 第一视角</a>';
          html += '    </div>';
        }
        html += '  </div>';
        html += '</div>';

        return html;
      }

      tableEl.innerHTML = teams.map(renderTeamRow).join('');

      // ---- ANIMATE HP BARS (staggered entry) ----
      setTimeout(function () {
        var fills = tableEl.querySelectorAll('.hp-fill');
        fills.forEach(function (f, i) {
          setTimeout(function () {
            f.classList.add('is-set');
            f.style.setProperty('--fill-target', f.dataset.hp + '%');
          }, i * 80);
        });
      }, 200);

      // ---- ANIMATE JOB BADGES (stagger entry) ----
      setTimeout(function () {
        var badges = tableEl.querySelectorAll('.job-badge');
        badges.forEach(function (b) {
          var delay = parseFloat(b.style.transitionDelay) || 0;
          setTimeout(function () {
            b.classList.add('is-in');
          }, delay + 400);
        });
      }, 100);

      // ---- CLICK TEAM ROW TO EXPAND ----
      tableEl.addEventListener('click', function (e) {
        var row = e.target.closest('.team-row');
        if (!row) return;
        var wasExpanded = row.classList.contains('is-expanded');
        // Collapse all
        tableEl.querySelectorAll('.team-row.is-expanded').forEach(function (r) {
          r.classList.remove('is-expanded');
          r.setAttribute('aria-expanded', 'false');
        });
        // Toggle clicked
        if (!wasExpanded) {
          row.classList.add('is-expanded');
          row.setAttribute('aria-expanded', 'true');
        }
      });

      // Keyboard support
      tableEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          var row = e.target.closest('.team-row');
          if (row) row.click();
        }
      });

      // ---- RENDER NEWS TICKER ----
      var tickerEl = document.getElementById('newsTicker');
      news.forEach(function (n) {
        var div = document.createElement('div');
        div.className = 'ticker-item';
        div.innerHTML = '<span class="ticker-time">' + n.time + '</span><span class="ticker-text' + (n.urgent ? ' urgent' : '') + '">' + n.text + '</span>';
        tickerEl.appendChild(div);
      });
    })();
  </script>
</body>
</html>
